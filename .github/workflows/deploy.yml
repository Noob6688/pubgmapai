name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Create wrangler.toml
        run: |
          cat > wrangler.toml << 'EOF'
          name = "pubg-map"
          main = ".open-next/worker.js"
          compatibility_date = "2025-01-01"
          compatibility_flags = ["nodejs_compat"]

          [vars]
          NEXT_PUBLIC_SUPABASE_URL = { default = "" }
          NEXT_PUBLIC_SUPABASE_ANON_KEY = { default = "" }
          NEXT_PUBLIC_R2_DOMAIN = { default = "" }

          [env.production]
          vars = {}

          [[r2_buckets]]
          binding = "NEXT_INC_CACHE_R2_BUCKET"
          bucket_name = "pubgmaptile"
          EOF

      - name: Build and Deploy
        run: |
          pnpm add -D @opennextjs/cloudflare wrangler
          npx opennextjs-cloudflare build --dangerouslyUseUnsupportedNextVersion
          npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_R2_DOMAIN: ${{ secrets.NEXT_PUBLIC_R2_DOMAIN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
